# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
modules:
  - type: dnf
    repos:
      cleanup: true # clean up added repos after module is done
      copr:
        - bieszczaders/kernel-cachyos-addons
        - deltacopy/darkly
        - infinality/kwin-effects-better-blur-dx
        # - xariann/tools # My personal COPR, not needed with Universal Blue base
    install:
      packages:
        # gaming
        - steam
        - goverlay
        - mangohud
        - vkbasalt
        - input-remapper
        # Utilities
        - fish
        - just # Should already be included with Ublue base, adding just in case
        - gum # Should already be included with Ublue base, adding just in case
        - docker
        - docker-compose
        # From bieszczaders/kernel-cachyos-addons
        - scx-scheds
        - scx-tools
        - scx-manager
        # From deltacopy/darkly
        - darkly
        # From infinality/kwin-effects-better-blur-dx
        - kwin-effects-better-blur-dx
        # From xariann/tools
        # - game-devices-udev

    remove:
      packages:
        - firefox # Using Flatpak instead
        - firefox-langpacks
        - fedora-flathub-remote # Using Flathub instead, might not be needed with Ublue base
