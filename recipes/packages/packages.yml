# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
modules:
  - type: dnf
    repos:
      copr:
        - bieszczaders/kernel-cachyos-addons
        - deltacopy/darkly
        - infinality/kwin-effects-better-blur-dx
        # - xariann/tools # Not needed with Ublue base
    install:
      packages:
        # gaming
        - steam
        - goverlay
        - mangohud
        - vkbasalt
        - input-remapper
        # Utilities
        - fish
        - just
        - gum
        - docker
        - docker-compose
        # From bieszczaders/kernel-cachyos-addons
        - scx-scheds
        - scx-tools
        - scx-manager
        # From deltacopy/darkly
        - darkly
        # From infinality/kwin-effects-better-blur-dx
        - kwin-effects-better-blur-dx
        # From xariann/tools
        # - game-devices-udev

    remove:
      packages:
        - firefox
        - firefox-langpacks
        - fedora-flathub-remote
