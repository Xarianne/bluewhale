# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
modules:
  - type: dnf
    repos:
      copr:
        - bieszczaders/kernel-cachyos-addons
        # - xariann/tools # Not needed with Ublue base
    install:
      packages:
        # gaming
        - steam
        - goverlay
        - mangohud
        - vkbasalt
        - input-remapper
        # Utilities
        - fish
        - just
        - gum
        - docker
        - docker-compose
        # From xariann/tools
        # - game-devices-udev
        # From bieszczaders/kernel-cachyos-addons
        - scx-scheds
        - scx-tools
        - scx-manager

    remove:
      packages:
        - firefox
        - firefox-langpacks
        - fedora-flathub-remote
