# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
modules:
  - type: dnf
    repos:
      copr: 
        # When using Ublue base my tool aren't needed
        - xariann/tools
        - bieszczaders/kernel-cachyos-addons
    install:
      packages:
        # gaming
        - steam
        - goverlay
        - mangohud
        - vkbasalt
        # other
        - chezmoi
        - fish
        - game-devices-udev
        - scx-scheds
        - scx-tools
        - scx-manager
    remove:
      packages:
        - firefox
        - firefox-langpacks
