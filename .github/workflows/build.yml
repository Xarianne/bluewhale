name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *" # build at 06:00 UTC every day
        # (20 minutes after last ublue images start building)
  push:
    paths-ignore: # don't rebuild if only documentation has changed
      - "**.md"

  pull_request:
  workflow_dispatch: # allow manually triggering builds
concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false # stop GH from cancelling all matrix builds if one fails
      matrix:
        recipe:
          # !! Add your recipes here
          - recipe.yml
    steps:
      # the build is fully handled by the reusable github action
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}

          # enabled by default, disable if your image is small and you want faster builds
          maximize_build_space: true

      - name: Rechunk with chunkah
        run: |
          # Get the image name from BlueBuild output
          IMAGE_NAME="${{ steps.build.outputs.image }}"

          # Pull the built image
          podman pull "${IMAGE_NAME}"

          # Save, rechunk, and reload
          podman save "${IMAGE_NAME}" | \
            podman run --rm -i quay.io/jlebon/chunkah | \
            podman load

          # Get the new image ID and tag it
          NEW_IMAGE_ID=$(podman images --format "{{.ID}}" --filter "dangling=true" | head -n1)
          podman tag "${NEW_IMAGE_ID}" "${IMAGE_NAME}"

          # Push the rechunked image
          podman push "${IMAGE_NAME}"

      - name: Re-sign rechunked image (optional)
        if: github.event_name != 'pull_request'
        run: |
          # Install cosign if not already available
          curl -sLO https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign

          # Sign the rechunked image
          echo "${{ secrets.SIGNING_SECRET }}" | cosign sign --key env://COSIGN_KEY "${IMAGE_NAME}"
        env:
          COSIGN_KEY: ${{ secrets.SIGNING_SECRET }}
